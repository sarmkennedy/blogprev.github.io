<!DOCTYPE html>

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Time Tracking Dashboard</title>
    <link rel="stylesheet" href="./dist/output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <body>
    <main>
      <article class="">
        <div class="user-info">
          <img alt="Photo of user" src="./Resources/images/image-jeremy.png"/>
          <h1>
            <span>Report for</span>
            <span>Jeremy Robson</span>
          </h1>
        </div>
        <nav class="timeframes">
          <button>Daily</button>
          <button>Weekly</button>
          <button>Monthly</button>
        </nav>
      </article>

      <ul class="activities">

        <li class="activity work">
          <div class="activity-card">
            <header>
              <h2>Work</h2>
              <button aria-label="Open menu">
                <img src="./Resources/images/icon-ellipsis.svg" alt=""/>
              </button>
            </header>
            <p class="current"><span class="hours">32</span>hrs</p>
            <p class="previous">Last Week - <span class="prev-hours">36</span>hrs</p>
          </div>
        </li>

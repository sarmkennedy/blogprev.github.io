<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Blog Post Preview Card</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="card">
        <div class="info">
            <img src="./Resources/images/illustration-article.svg" alt="Yellow and black abstract image." class="abstract">
            <span class="cat">Learning</span>
            <p class="date">Published 21 Dec 2023</p>
            <h1><a href="#">HTML & CSS foundations</a></h1>
            <p class="desc">These languages are the backbone of every website, defining structure, content, and presentation.</p>
        </div>
        <div class="author">
            <img src="./Resources/images/image-avatar.webp" alt="Photo of author." class="av">
            <p class="auth">Greg Hooper</p>
        </div>
    </div>
  </body>
</html>

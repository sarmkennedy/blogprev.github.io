<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Time Tracking Dashboard</title>
    <link rel="stylesheet" href="./dist/output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  </head>
  <body class="bg-navy-950 text-white font-rubik p-6 min-h-screen flex items-center justify-center">
    <main class="w-full max-w-xs">
      <article class="rounded-2xl flex flex-col overflow-hidden bg-navy-900">
        <div class="flex flex-row md:flex-col items-center gap-6 p-6 bg-purple-brand rounded-2xl">
          <img class="w-16 h-16 rounded-full border-2 border-white" alt="Photo of user" src="./Resources/images/image-jeremy.png"/>
          <h1>
            <span class="block text-sm text-navy-200">Report for</span>
            <span class="block text-2xl md:text-4xl font-thin">Jeremy Robson</span>
          </h1>
        </div>
        <nav class="timeframes flex flex-row md:flex-col justify-between items-center p-6">
          <button class="text-left text-navy-200 hover:text-white font-reg">Daily</button>
          <button class="text-left text-navy-200 hover:text-white font-reg">Weekly</button>
          <button class="text-left text-navy-200 hover:text-white font-reg">Monthly</button>
        </nav>
      </article>

      <ul class="activities">
        <li class="activity-work bg-work rounded-2xl">
          <div class="activity-card">
            <header>
              <h2>Work</h2>
              <button aria-label="Open menu">
                <img src="./Resources/images/icon-ellipsis.svg" alt=""/>
              </button>
            </header>
            <p class="current"><span class="hours">32</span>hrs</p>
            <p class="previous">Last Week - <span class="prev-hours">36</span>hrs</p>
          </div>
        </li>

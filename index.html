<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Time Tracking Dashboard</title>
    <link rel="stylesheet" href="./dist/output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  </head>
  <body class="bg-navy-950 text-white font-rubik p-6 min-h-screen flex items-center justify-center">
    <main>
      <article class="rounded-2xl p-6 flex flex-col gap-3">
        <div class="flex flex-col gap-3 bg-purple-brand rounded-2xl pr-8 pl-8 pt-20 pb-25 z-10">
          <img class="w-16 h-16 rounded-full border-2 border-white" alt="Photo of user" src="./Resources/images/image-jeremy.png"/>
          <h1>
            <span class="block text-sm text-navy-200">Report for</span>
            <span class="block text-4xl font-thin">Jeremy Robson</span>
          </h1>
        </div>
        <nav class="timeframes flex flex-col gap-3 bg-navy-900 rounded-b-2xl pt-10 pr-8 pl-8 pb-8 -mt-6 z-0">
          <button class="text-left text-navy-200 hover:text-white font-reg">Daily</button>
          <button class="text-left text-navy-200 hover:text-white font-reg">Weekly</button>
          <button class="text-left text-navy-200 hover:text-white font-reg">Monthly</button>
        </nav>
      </article>

      <ul class="activities">

        <li class="activity work">
          <div class="activity-card">
            <header>
              <h2>Work</h2>
              <button aria-label="Open menu">
                <img src="./Resources/images/icon-ellipsis.svg" alt=""/>
              </button>
            </header>
            <p class="current"><span class="hours">32</span>hrs</p>
            <p class="previous">Last Week - <span class="prev-hours">36</span>hrs</p>
          </div>
        </li>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Results Summary Component</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <div class="card">
        <section class="results">
          <h2>Your Result</h2>
          <div class="circle">
            <p class="score">76</p>
            <p class="total">of 100</p>
          </div>
          <div class="report">
            <h3 class="rank">Great</h3>
            <p class="eval">You scored higher than 65% of the people who have taken these tests.</p>
          </div>
        </section>
        <section class="summary">
          <h2>Summary</h2>
          <ul>
            <li class="react">
              <div class="type">
                <img src="./Resources/images/icon-reaction.svg" alt="">
                <span>Reaction</span>
              </div>
              <p class="score-row">
                <span class="num">80</span>
                <span class="outof"> / 100</span>
              </p>
            </li>
            <li class="memory">
              <div class="type">
                <img src="./Resources/images/icon-memory.svg" alt="">
                <span>Memory</span>
              </div>
              <p class="score-row">
                <span class="num">92</span>
                <span class="outof"> / 100</span>
              </p>
            </li>
            <li class="verbal">
              <div class="type">
                <img src="./Resources/images/icon-verbal.svg" alt="">
                <span>Verbal</span>
              </div>
              <p class="score-row">
                <span class="num">71</span>
                <span class="outof"> / 100</span>
              </p>
            </li>
            <li class="visual">
              <div class="type">
                <img src="./Resources/images/icon-visual.svg" alt="">
                <span>Visual</span>
              </div>
              <p class="score-row">
                <span class="num">63</span>
                <span class="outof"> / 100</span>
              </p>
            </li>
          </ul>
          <button>Continue</button>
        </section>
      </div>
    </main>
  </body>
</html>
